spring:
  application:
    name: opscore
  
  datasource:
    url: jdbc:postgresql://localhost:5432/opscore_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        type:
          preferred_jdbc_type_for_enum: NAMED
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  accessTokenExpiry: 900000
  refreshTokenExpiry: 604800000

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
